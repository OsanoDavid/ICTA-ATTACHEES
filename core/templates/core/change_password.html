<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICTA Portal - Secure Password Reset</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a, #7c3aed);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .form-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
        }
        .btn-primary {
            background: #7c3aed;
            border: none;
            padding: 0.75rem;
            font-weight: 700;
        }
        .btn-primary:hover {
            background: #6d28d9;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <div class="text-center mb-4">
            <img src="/static/images/logo1.png" alt="Logo" class="mb-3" style="max-height: 50px;">
            <h4 class="fw-bold text-dark">Update Password</h4>
            <p class="text-muted small">Update your secure credentials for the ICTA Portal</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} small py-2 fw-semibold">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold">Old Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" name="old_password" class="form-control border-start-0 bg-light" placeholder="Current password" required>
                </div>
            </div>

            <div class="mb-3 border-top pt-3">
                <label class="form-label small fw-bold">New Secure Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-key-fill"></i></span>
                    <input type="password" name="new_password" class="form-control border-start-0 bg-light" placeholder="Min. 8 characters" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Confirm New Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-check2-circle"></i></span>
                    <input type="password" name="confirm_password" class="form-control border-start-0 bg-light" placeholder="Repeat new password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 shadow-sm mb-3" id="resetBtn">
                <span id="resetTxt">Update Password Now</span>
                <span id="resetSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
            </button>

            <div class="text-center">
                <a href="{% url 'attachee_dashboard' %}" class="text-decoration-none small text-muted hover-primary">
                    <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                </a>
            </div>
        </form>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function() {
            const btn = document.getElementById('resetBtn');
            const txt = document.getElementById('resetTxt');
            const spin = document.getElementById('resetSpinner');
            btn.classList.add('disabled');
            txt.textContent = 'Updating...';
            spin.classList.remove('d-none');
        });
    </script>
    {% include 'core/accessibility_snippet.html' %}
</body>
</html>
