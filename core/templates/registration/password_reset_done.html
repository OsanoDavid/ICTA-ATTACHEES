<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICTA Portal - Link Sent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow text-center" style="width: 420px;">
        
        <div class="mb-3">
            <img src="/static/images/logo1.png" alt="ICT Authority Logo" class="img-fluid" style="max-height: 65px; object-fit: contain;">
        </div>
        
        <i class="bi bi-envelope-check text-success fs-1 mb-2"></i>
        <h4 class="fw-bold" style="font-family: 'Times New Roman', Times, serif;">Check Your Email</h4>
        <p class="text-muted small mt-2">We have sent a recovery token link to your address. Please verify your email inbox and spam folders to finish updating your security profile credentials.</p>
        
        <a href="{% url 'login' %}" class="btn btn-primary w-100 mt-3 fw-bold py-2">Return to Login</a>
    </div>
</body>
</html>
