<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICTA Portal - Reset Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow position-relative" style="width: 420px;">
        
        <div class="position-absolute" style="top: 20px; left: 20px;">
            <a href="{% url 'login' %}" class="text-secondary text-decoration-none fw-bold small d-flex align-items-center gap-1" title="Back to Login">
                <i class="bi bi-arrow-left fs-5"></i> Back
            </a>
        </div>
        
        <div class="text-center mb-3">
            <img src="/static/images/logo1.png" alt="ICT Authority Logo" class="img-fluid" style="max-height: 65px; object-fit: contain;">
        </div>

        <h3 class="text-center mb-2" style="font-family: 'Times New Roman', Times, serif; font-weight: bold;">Reset Password</h3>
        <p class="text-muted text-center small mb-4">Provide your registered email address below to receive password recovery configurations.</p>
        
        {% if messages %}
            <div id="django-flash-message">
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'success' %}success border-success border-start border-4{% else %}danger border-danger border-start border-4{% endif %} alert-dismissible fade show small py-2 fw-semibold mb-3 shadow-sm" role="alert">
                        {% if message.tags == 'success' %}
                            <i class="bi bi-check-circle-fill me-2"></i>
                        {% else %}
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        {% endif %}
                        {{ message }}
                        <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        <form method="POST" id="resetForm" onsubmit="handleResetSubmit(event)">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" value="{{ email|default:'' }}" placeholder="e.g. name@example.com" required>
            </div>
            
            <button type="submit" id="submitBtn" class="btn btn-primary w-100 mt-2 fw-bold d-flex align-items-center justify-content-center gap-2 py-2">
                <span id="btnText">Send Reset Link</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
            </button>
            
            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="text-decoration-none text-muted small"><i class="bi bi-box-arrow-in-right me-1"></i>Remember password? Login</a>
            </div>
        </form>
    </div>

    <script>
        // Form execution locking parameters with an asynchronous spinner 
        function handleResetSubmit(event) {
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            submitBtn.disabled = true; 
            btnText.textContent = "Checking Records...";
            btnSpinner.classList.remove('d-none');
            
            return true;
        }

        // Monitors notifications and forces fading dismissals seamlessly after 4 seconds
        document.addEventListener("DOMContentLoaded", function() {
            const alertMessage = document.getElementById("django-flash-message");
            if (alertMessage) {
                setTimeout(function() {
                    const alerts = alertMessage.querySelectorAll('.alert');
                    alerts.forEach(function(alert) {
                        const bsAlert = new bootstrap.Alert(alert);
                        bsAlert.close();
                    });
                }, 4000);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
